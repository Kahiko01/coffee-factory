<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Karuhiu Utheri Digital Farmers Co-op</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient-dark: linear-gradient(135deg, #09150d 0%, #0d1f14 50%, #1a1612 100%);
            --panel-bg: rgba(13, 27, 18, 0.5);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #e1ede6;
            --text-muted: #8fa396;
            --emerald: #10b981;
            --gold: #d4af37;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-gradient-dark); color: var(--text-main); min-height:100vh; display:flex; justify-content:center; align-items:center; }
        body::before { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background-image:url('https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80&w=1920'); background-size:cover; opacity:0.04; z-index:-2; }
        .register-wrapper { width:100%; max-width:460px; padding:20px; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border:1px solid var(--panel-border); border-radius:24px; padding:36px; }
        .register-header { text-align:center; margin-bottom:28px; }
        .register-header .logo { font-size:2.5rem; }
        .register-header h1 { font-family:'Playfair Display',serif; font-size:1.4rem; background:linear-gradient(to right, var(--gold), #fff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .register-header p { color:var(--text-muted); font-size:0.85rem; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; margin-bottom:6px; color:var(--text-muted); font-size:0.8rem; font-weight:500; }
        .form-group input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.03); border:1px solid var(--panel-border); border-radius:12px; color:var(--text-main); font-size:0.95rem; transition:var(--transition-smooth); }
        .form-group input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 20px rgba(212,175,55,0.1); }
        .btn-register { width:100%; padding:14px; background:linear-gradient(135deg, var(--gold), #b8941f); border:none; border-radius:14px; color:#000; font-size:1rem; font-weight:600; cursor:pointer; transition:var(--transition-smooth); margin-top:8px; }
        .btn-register:hover { transform:translateY(-2px); box-shadow:0 10px 40px rgba(212,175,55,0.3); }
        .alert { padding:12px 16px; border-radius:12px; margin-bottom:16px; text-align:center; font-size:0.9rem; }
        .alert-danger { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444; }
        .links { text-align:center; margin-top:20px; }
        .links a { color:var(--text-muted); text-decoration:none; font-size:0.85rem; }
        .links a:hover { color:var(--gold); }
        .required::after { content:" *"; color:#ef4444; }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="glass-panel">
            <div class="register-header">
                <div class="logo">🌱</div>
                <h1>Join Karuhiu Utheri</h1>
                <p>Create your farmer account</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="form-group">
                    <label class="required">Full Name</label>
                    <input type="text" name="full_name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label class="required">Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label class="required">Password</label>
                    <input type="password" name="password" placeholder="Create a strong password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="+254XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label class="required">Membership Number</label>
                    <input type="text" name="membership_number" placeholder="Your cooperative membership number" required>
                </div>
                <button type="submit" class="btn-register">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>
            <div class="links">
                Already have an account? <a href="/login">Sign In</a>
            </div>
        </div>
        <div style="text-align:center; margin-top:16px;">
            <a href="/" style="color:var(--text-muted); text-decoration:none; font-size:0.85rem;">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
</body>
</html>
