<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Karuhiu Utheri</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient-dark: linear-gradient(135deg, #09150d 0%, #0d1f14 50%, #1a1612 100%);
            --panel-bg: rgba(13, 27, 18, 0.5);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #e1ede6;
            --text-muted: #8fa396;
            --emerald: #10b981;
            --gold: #d4af37;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-gradient-dark); color: var(--text-main); min-height:100vh; display:flex; justify-content:center; align-items:center; }
        body::before { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background-image:url('https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80&w=1920'); background-size:cover; opacity:0.04; z-index:-2; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(20px); border:1px solid var(--panel-border); border-radius:24px; padding:40px; max-width:420px; width:100%; }
        .reset-header { text-align:center; margin-bottom:28px; }
        .reset-header .logo { font-size:2.5rem; }
        .reset-header h1 { font-family:'Playfair Display',serif; font-size:1.4rem; background:linear-gradient(to right, var(--gold), #fff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .reset-header p { color:var(--text-muted); font-size:0.85rem; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; margin-bottom:6px; color:var(--text-muted); font-size:0.85rem; }
        .form-group input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.03); border:1px solid var(--panel-border); border-radius:12px; color:var(--text-main); font-size:0.95rem; }
        .form-group input:focus { outline:none; border-color:var(--gold); }
        .btn { width:100%; padding:14px; border:none; border-radius:14px; font-size:1rem; font-weight:600; cursor:pointer; transition:var(--transition-smooth); }
        .btn-gold { background:linear-gradient(135deg, var(--gold), #b8941f); color:#000; }
        .btn-gold:hover { transform:translateY(-2px); box-shadow:0 10px 40px rgba(212,175,55,0.3); }
        .alert { padding:12px 16px; border-radius:12px; margin-bottom:16px; text-align:center; font-size:0.9rem; }
        .alert-success { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3); color:var(--emerald); }
        .alert-danger { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444; }
        .back-link { text-align:center; margin-top:20px; }
        .back-link a { color:var(--text-muted); text-decoration:none; font-size:0.85rem; }
        .back-link a:hover { color:var(--gold); }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="reset-header">
            <div class="logo">🔑</div>
            <h1>Reset Password</h1>
            <p>Enter your credentials to reset</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Membership Number</label>
                <input type="text" name="membership_number" placeholder="Enter your membership number" required>
            </div>
            <button type="submit" class="btn btn-gold">
                <i class="fa-solid fa-key"></i> Reset Password
            </button>
        </form>
        <div class="back-link">
            <a href="/login"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
</body>
</html>
