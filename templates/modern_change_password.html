<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Karuhiu Utheri</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient-dark: linear-gradient(135deg, #09150d 0%, #0d1f14 50%, #1a1612 100%);
            --panel-bg: rgba(13, 27, 18, 0.45);
            --panel-border: rgba(255, 255, 255, 0.06);
            --text-main: #e1ede6;
            --text-muted: #8fa396;
            --emerald: #10b981;
            --gold: #d4af37;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-gradient-dark); color: var(--text-main); min-height:100vh; display:flex; justify-content:center; align-items:center; }
        body::before { content:''; position:fixed; top:0; left:0; width:100%; height:100%; background-image:url('https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80&w=1920'); background-size:cover; opacity:0.04; z-index:-2; }
        .glass-panel { background: var(--panel-bg); backdrop-filter: blur(20px); border:1px solid var(--panel-border); border-radius:24px; padding:40px; max-width:450px; width:100%; }
        h2 { font-family:'Playfair Display',serif; color:var(--gold); text-align:center; margin-bottom:24px; }
        .form-group { margin-bottom:20px; }
        .form-group label { display:block; margin-bottom:8px; color:var(--text-muted); font-size:0.9rem; }
        .form-group input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.05); border:1px solid var(--panel-border); border-radius:12px; color:var(--text-main); font-size:1rem; }
        .form-group input:focus { outline:none; border-color:var(--gold); }
        .btn { width:100%; padding:14px; border:none; border-radius:12px; font-size:1rem; font-weight:600; cursor:pointer; transition:var(--transition-smooth); }
        .btn-gold { background:var(--gold); color:#000; }
        .btn-gold:hover { box-shadow:0 0 20px rgba(212,175,55,0.4); }
        .alert { padding:12px; border-radius:10px; margin-bottom:16px; text-align:center; }
        .alert-success { background:rgba(16,185,129,0.2); color:var(--emerald); }
        .alert-danger { background:rgba(239,68,68,0.2); color:#ef4444; }
        .back-link { text-align:center; margin-top:16px; }
        .back-link a { color:var(--text-muted); text-decoration:none; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h2>🔒 Change Password</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST" action="/change-password">
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-gold">Update Password</button>
        </form>
        <div class="back-link">
            <a href="/farmer/modern-dashboard">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
